specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Brevo
providerId: brevo
publisherName: Sendinblue SAS (Brevo)
serviceCategory: Email & Marketing Automation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Email
  - Transactional
  - SMS
  - Marketing
  - CRM
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Brevo: tiered subscription priced on monthly email send volume,
  with up to 100K contacts allowed across plans. Free tier caps daily sends at 300; paid tiers (Starter,
  Business) scale subscription cost with chosen email volume; BrevoPlus / Enterprise is custom-priced.'
sources:
  - https://www.brevo.com/pricing/
  - https://developers.brevo.com/docs/api-limits
billingModel:
  pricingCategory: Tiered Subscription (volume-based)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Brevo
  ServiceCategory: Email & Marketing Automation
  ProviderName: Brevo
  PublisherName: Sendinblue SAS
  InvoiceIssuerName: Sendinblue SAS
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: subscription-month
meters:
  - name: subscription_month
    description: Plan subscription fee billed monthly. Price scales with the chosen email volume tier.
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - email_volume_tier
      - billing_cycle
  - name: emails_sent
    description: Marketing and transactional emails sent against the plan's monthly volume.
    unit: email
    aggregation: sum
    dimensions:
      - email_type
      - campaign
  - name: sms_sent
    description: Transactional and marketing SMS sent; billed per SMS per destination country.
    unit: message
    aggregation: sum
    dimensions:
      - country
      - message_type
  - name: contacts
    description: Stored contacts on the account.
    unit: contact
    aggregation: max
    dimensions:
      - list
  - name: automation_contacts
    description: Contacts engaged through marketing automation; capped at 2K on Free.
    unit: contact
    aggregation: max
    dimensions:
      - workflow
principles:
  - name: Visibility
    description: Pull send-volume, deliverability, and SMS country breakdowns from the Brevo dashboard
      and the statistics API; reconcile monthly against the chosen email-volume tier.
  - name: Allocation
    description: Tag campaigns and transactional templates with the consuming product / brand; use sub-accounts
      where available so subscription fees can be split.
  - name: Optimization
    description: Choose the smallest email-volume tier that fits actual sends, suppress inactive contacts
      to keep within tier limits, and prefer transactional SMTP for triggered messages over marketing
      sends. Annual billing pricing is sometimes available; large 100K+ senders should compare Starter
      vs Business at their volume.
  - name: Accountability
    description: Designate a messaging-platform owner; alert when daily / monthly send approaches tier
      cap, and revisit BrevoPlus negotiation at sustained 1M+ send volumes.
maintainers:
