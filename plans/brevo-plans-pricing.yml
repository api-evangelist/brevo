specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Brevo
providerId: brevo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Email
  - Transactional
  - SMS
  - Marketing
  - CRM
  - Automation
description: Brevo (formerly Sendinblue) bills its marketing platform on email send volume rather than
  contact count, with up to 100,000 contacts allowed across plans. Tiers ladder from a forever-Free plan
  (300 emails/day) through Starter ($9/mo at 5K emails) and Business ($18/mo at 5K emails) up to a custom-priced
  Enterprise (BrevoPlus) tier with dedicated account management. Higher email volumes scale the monthly
  fee on the same tier (e.g. 100K emails costs ~$69 Starter / ~$129 Business).
sources:
  - https://www.brevo.com/pricing/
  - https://developers.brevo.com/docs/api-limits
plans:
  - id: brevo-free
    name: Free
    type: freemium
    description: Forever-free plan with a daily send cap; up to 100,000 contacts and 40+ templates.
    entries:
      - label: Email send limit
        name: emails
        type: quota
        metric: email
        limit: 300
        timeFrame: day
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Contacts
        name: contacts
        type: quota
        metric: contact
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Marketing automation
        name: automation_contacts
        type: quota
        metric: contact
        limit: 2000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: 40+ Email Templates
      - name: Drag-and-Drop Editor
      - name: Transactional Email API
  - id: brevo-starter
    name: Starter
    type: subscription
    description: Entry paid tier; pricing scales with monthly email volume.
    entries:
      - label: Subscription (5K emails/month)
        name: subscription_5k
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $9/month
        userMultiplied: false
      - label: Subscription (100K emails/month)
        name: subscription_100k
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $69/month
        userMultiplied: false
      - label: Daily send cap
        name: daily_send
        type: quota
        metric: email
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: No Daily Sending Limit
      - name: Core Marketing Features
      - name: Email Support
  - id: brevo-business
    name: Business
    type: subscription
    description: Business / Standard tier adds A/B testing, landing pages, multi-user access, priority
      support, and unlimited automation workflows. Pricing scales with monthly email volume.
    entries:
      - label: Subscription (5K emails/month)
        name: subscription_5k
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $18/month
        userMultiplied: false
      - label: Subscription (100K emails/month)
        name: subscription_100k
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $129/month
        userMultiplied: false
    elements:
      - name: A/B Testing
      - name: Landing Pages
      - name: Multi-user Access
      - name: Priority Email Support
      - name: Unlimited Automation Workflows
  - id: brevo-enterprise
    name: BrevoPlus / Enterprise
    type: enterprise
    description: Custom-priced enterprise plan with dedicated account management and advanced security.
    entries:
      - label: Custom subscription
        name: custom_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Dedicated Account Management
      - name: Advanced Security Features
      - name: Custom Volume
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
