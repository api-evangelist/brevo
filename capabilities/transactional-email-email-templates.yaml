naftiko: 1.0.0-alpha2
info:
  label: Brevo Transactional Email API — Email Templates
  description: 'Brevo Transactional Email API — Email Templates. 5 operations. Lead operation: List email templates. Self-contained
    Naftiko capability covering one Brevo business surface.'
  tags:
  - Brevo
  - Email Templates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: transactional-email-email-templates
    baseUri: https://api.brevo.com/v3
    description: Brevo Transactional Email API — Email Templates business capability. Self-contained, no shared references.
    resources:
    - name: smtp-templates
      path: /smtp/templates
      operations:
      - name: listsmtptemplates
        method: GET
        description: List email templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateStatus
          in: query
          type: boolean
          description: Filter templates by their active status.
      - name: createsmtptemplate
        method: POST
        description: Create an email template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: smtp-templates-templateId
      path: /smtp/templates/{templateId}
      operations:
      - name: getsmtptemplate
        method: GET
        description: Get an email template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesmtptemplate
        method: PUT
        description: Update an email template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesmtptemplate
        method: DELETE
        description: Delete an email template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: transactional-email-email-templates-rest
    port: 8080
    description: REST adapter for Brevo Transactional Email API — Email Templates. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/smtp/templates
      name: smtp-templates
      description: REST surface for smtp-templates.
      operations:
      - method: GET
        name: listsmtptemplates
        description: List email templates
        call: transactional-email-email-templates.listsmtptemplates
        with:
          templateStatus: rest.templateStatus
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsmtptemplate
        description: Create an email template
        call: transactional-email-email-templates.createsmtptemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/smtp/templates/{templateid}
      name: smtp-templates-templateid
      description: REST surface for smtp-templates-templateId.
      operations:
      - method: GET
        name: getsmtptemplate
        description: Get an email template
        call: transactional-email-email-templates.getsmtptemplate
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesmtptemplate
        description: Update an email template
        call: transactional-email-email-templates.updatesmtptemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesmtptemplate
        description: Delete an email template
        call: transactional-email-email-templates.deletesmtptemplate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transactional-email-email-templates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Transactional Email API — Email Templates. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-email-templates
      description: List email templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transactional-email-email-templates.listsmtptemplates
      with:
        templateStatus: tools.templateStatus
      outputParameters:
      - type: object
        mapping: $.
    - name: create-email-template
      description: Create an email template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transactional-email-email-templates.createsmtptemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-email-template
      description: Get an email template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transactional-email-email-templates.getsmtptemplate
      outputParameters:
      - type: object
        mapping: $.
    - name: update-email-template
      description: Update an email template
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: transactional-email-email-templates.updatesmtptemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-email-template
      description: Delete an email template
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: transactional-email-email-templates.deletesmtptemplate
      outputParameters:
      - type: object
        mapping: $.
