        description: Get all contact lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
          description: Sort direction for the results.
      - name: createcontactlist
        method: POST
        description: Create a contact list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: contacts-lists-listId
      path: /contacts/lists/{listId}
      operations:
      - name: getcontactlist
        method: GET
        description: Get a contact list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecontactlist
        method: PUT
        description: Update a contact list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
