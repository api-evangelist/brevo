      - name: addcontactstolist
        method: POST
        description: Add contacts to a list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: contacts-lists-listId-contacts-remove
