naftiko: 1.0.0-alpha2
info:
  label: Brevo Email Campaigns API — Campaign Statistics
  description: 'Brevo Email Campaigns API — Campaign Statistics. 1 operations. Lead operation: Export recipients of an email
    campaign. Self-contained Naftiko capability covering one Brevo business surface.'
  tags:
  - Brevo
  - Campaign Statistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: email-campaigns-campaign-statistics
    baseUri: https://api.brevo.com/v3
    description: Brevo Email Campaigns API — Campaign Statistics business capability. Self-contained, no shared references.
    resources:
    - name: emailCampaigns-campaignId-exportRecipients
      path: /emailCampaigns/{campaignId}/exportRecipients
      operations:
      - name: exportcampaignrecipients
        method: POST
        description: Export recipients of an email campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: email-campaigns-campaign-statistics-rest
    port: 8080
    description: REST adapter for Brevo Email Campaigns API — Campaign Statistics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/emailcampaigns/{campaignid}/exportrecipients
      name: emailcampaigns-campaignid-exportrecipients
      description: REST surface for emailCampaigns-campaignId-exportRecipients.
      operations:
      - method: POST
        name: exportcampaignrecipients
        description: Export recipients of an email campaign
        call: email-campaigns-campaign-statistics.exportcampaignrecipients
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: email-campaigns-campaign-statistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Email Campaigns API — Campaign Statistics. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: export-recipients-email-campaign
      description: Export recipients of an email campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: email-campaigns-campaign-statistics.exportcampaignrecipients
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
