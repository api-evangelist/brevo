naftiko: 1.0.0-alpha2
info:
  label: Brevo Webhooks API — Webhooks
  description: 'Brevo Webhooks API — Webhooks. 5 operations. Lead operation: Get all webhooks. Self-contained Naftiko capability
    covering one Brevo business surface.'
  tags:
  - Brevo
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: webhooks-webhooks
    baseUri: https://api.brevo.com/v3
    description: Brevo Webhooks API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: Get all webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter webhooks by type. Returns all types if not specified.
        - name: sort
          in: query
          type: string
          description: Sort direction for the results.
      - name: createwebhook
        method: POST
        description: Create a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-webhookId
      path: /webhooks/{webhookId}
      operations:
      - name: getwebhook
        method: GET
        description: Get a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatewebhook
        method: PUT
        description: Update a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletewebhook
        method: DELETE
        description: Delete a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: webhooks-webhooks-rest
    port: 8080
    description: REST adapter for Brevo Webhooks API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: Get all webhooks
        call: webhooks-webhooks.listwebhooks
        with:
          type: rest.type
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create a webhook
        call: webhooks-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhookid}
      name: webhooks-webhookid
      description: REST surface for webhooks-webhookId.
      operations:
      - method: GET
        name: getwebhook
        description: Get a webhook
        call: webhooks-webhooks.getwebhook
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatewebhook
        description: Update a webhook
        call: webhooks-webhooks.updatewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Delete a webhook
        call: webhooks-webhooks.deletewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Webhooks API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-webhooks
      description: Get all webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-webhooks.listwebhooks
      with:
        type: tools.type
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-webhook
      description: Get a webhook
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-webhooks.getwebhook
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks-webhooks.updatewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: webhooks-webhooks.deletewebhook
      outputParameters:
      - type: object
        mapping: $.
