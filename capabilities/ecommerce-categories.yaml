naftiko: 1.0.0-alpha2
info:
  label: Brevo eCommerce API — Categories
  description: 'Brevo eCommerce API — Categories. 3 operations. Lead operation: Return all categories. Self-contained Naftiko
    capability covering one Brevo business surface.'
  tags:
  - Brevo
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: ecommerce-categories
    baseUri: https://api.brevo.com/v3
    description: Brevo eCommerce API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: categories
      path: /categories
      operations:
      - name: listcategories
        method: GET
        description: Return all categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ids
          in: query
          type: string
          description: Comma-separated list of category IDs to filter by.
      - name: createupdatecategory
        method: POST
        description: Create or update a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: categories-batch
      path: /categories/batch
      operations:
      - name: batchcreateupdatecategories
        method: POST
        description: Create or update categories in batch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ecommerce-categories-rest
    port: 8080
    description: REST adapter for Brevo eCommerce API — Categories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for categories.
      operations:
      - method: GET
        name: listcategories
        description: Return all categories
        call: ecommerce-categories.listcategories
        with:
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createupdatecategory
        description: Create or update a category
        call: ecommerce-categories.createupdatecategory
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/batch
      name: categories-batch
      description: REST surface for categories-batch.
      operations:
      - method: POST
        name: batchcreateupdatecategories
        description: Create or update categories in batch
        call: ecommerce-categories.batchcreateupdatecategories
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ecommerce-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo eCommerce API — Categories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: return-all-categories
      description: Return all categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ecommerce-categories.listcategories
      with:
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-category
      description: Create or update a category
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ecommerce-categories.createupdatecategory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-categories-batch
      description: Create or update categories in batch
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ecommerce-categories.batchcreateupdatecategories
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
