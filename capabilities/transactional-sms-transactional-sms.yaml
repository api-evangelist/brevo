naftiko: 1.0.0-alpha2
info:
  label: Brevo Transactional SMS API — Transactional SMS
  description: 'Brevo Transactional SMS API — Transactional SMS. 1 operations. Lead operation: Send a transactional SMS. Self-contained
    Naftiko capability covering one Brevo business surface.'
  tags:
  - Brevo
  - Transactional SMS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: transactional-sms-transactional-sms
    baseUri: https://api.brevo.com/v3
    description: Brevo Transactional SMS API — Transactional SMS business capability. Self-contained, no shared references.
    resources:
    - name: transactionalSMS-sms
      path: /transactionalSMS/sms
      operations:
      - name: sendtransactionalsms
        method: POST
        description: Send a transactional SMS
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: transactional-sms-transactional-sms-rest
    port: 8080
    description: REST adapter for Brevo Transactional SMS API — Transactional SMS. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/transactionalsms/sms
      name: transactionalsms-sms
      description: REST surface for transactionalSMS-sms.
      operations:
      - method: POST
        name: sendtransactionalsms
        description: Send a transactional SMS
        call: transactional-sms-transactional-sms.sendtransactionalsms
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transactional-sms-transactional-sms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Transactional SMS API — Transactional SMS. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: send-transactional-sms
      description: Send a transactional SMS
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transactional-sms-transactional-sms.sendtransactionalsms
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
