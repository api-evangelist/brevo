naftiko: 1.0.0-alpha2
info:
  label: Brevo Contacts API — Contacts
  description: 'Brevo Contacts API — Contacts. 5 operations. Lead operation: Get all contacts. Self-contained Naftiko capability
    covering one Brevo business surface.'
  tags:
  - Brevo
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: contacts-contacts
    baseUri: https://api.brevo.com/v3
    description: Brevo Contacts API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: Get all contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: modifiedSince
          in: query
          type: string
          description: Filter contacts modified since this date-time in ISO 8601 format.
        - name: sort
          in: query
          type: string
          description: Sort direction for the results.
      - name: createcontact
        method: POST
        description: Create a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: contacts-identifier
      path: /contacts/{identifier}
      operations:
      - name: getcontactinfo
        method: GET
        description: Get a contact's details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Start date for retrieving contact statistics.
        - name: endDate
          in: query
          type: string
          description: End date for retrieving contact statistics.
      - name: updatecontact
        method: PUT
        description: Update a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecontact
        method: DELETE
        description: Delete a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: contacts-contacts-rest
    port: 8080
    description: REST adapter for Brevo Contacts API — Contacts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: Get all contacts
        call: contacts-contacts.listcontacts
        with:
          modifiedSince: rest.modifiedSince
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontact
        description: Create a contact
        call: contacts-contacts.createcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contacts/{identifier}
      name: contacts-identifier
      description: REST surface for contacts-identifier.
      operations:
      - method: GET
        name: getcontactinfo
        description: Get a contact's details
        call: contacts-contacts.getcontactinfo
        with:
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecontact
        description: Update a contact
        call: contacts-contacts.updatecontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecontact
        description: Delete a contact
        call: contacts-contacts.deletecontact
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: contacts-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Contacts API — Contacts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-contacts
      description: Get all contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contacts-contacts.listcontacts
      with:
        modifiedSince: tools.modifiedSince
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: contacts-contacts.createcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-contact-s-details
      description: Get a contact's details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contacts-contacts.getcontactinfo
      with:
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: update-contact
      description: Update a contact
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: contacts-contacts.updatecontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-contact
      description: Delete a contact
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: contacts-contacts.deletecontact
      outputParameters:
      - type: object
        mapping: $.
