naftiko: 1.0.0-alpha2
info:
  label: Brevo Contacts API — Folders
  description: 'Brevo Contacts API — Folders. 2 operations. Lead operation: Get all folders. Self-contained Naftiko capability
    covering one Brevo business surface.'
  tags:
  - Brevo
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BREVO_API_KEY: BREVO_API_KEY
capability:
  consumes:
  - type: http
    namespace: contacts-folders
    baseUri: https://api.brevo.com/v3
    description: Brevo Contacts API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: contacts-folders
      path: /contacts/folders
      operations:
      - name: listfolders
        method: GET
        description: Get all folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createfolder
        method: POST
        description: Create a folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: api-key
      value: '{{env.BREVO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: contacts-folders-rest
    port: 8080
    description: REST adapter for Brevo Contacts API — Folders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/contacts/folders
      name: contacts-folders
      description: REST surface for contacts-folders.
      operations:
      - method: GET
        name: listfolders
        description: Get all folders
        call: contacts-folders.listfolders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolder
        description: Create a folder
        call: contacts-folders.createfolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: contacts-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Brevo Contacts API — Folders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-folders
      description: Get all folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: contacts-folders.listfolders
      outputParameters:
      - type: object
        mapping: $.
    - name: create-folder
      description: Create a folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: contacts-folders.createfolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
